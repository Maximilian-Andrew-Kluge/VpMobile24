  <text x="140" y="80" font-size="28" font-weight="700" fill="#ffffff" font-family="Inter,sans-serif">Pro-Supporter</text>
  <!-- Subtitle -->
  <text x="140" y="110" font-size="16" fill="#94a3b8" font-family="Inter,sans-serif">10 € / Monat</text>
  <!-- Gold tag -->
  <rect x="140" y="130" width="160" height="28" rx="14" fill="rgba(252,211,77,0.15)" stroke="rgba(252,211,77,0.5)" stroke-width="1.5"/>
  <text x="220" y="149" text-anchor="middle" font-size="13" fill="#fcd34d" font-family="Inter,sans-serif" font-weight="700">VpMobile24 PRO</text>
  <!-- Bottom text -->
