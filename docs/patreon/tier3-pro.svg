      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="460" height="200" rx="16" fill="url(#bg3)"/>
  <!-- Gold accent line -->
  <rect x="0" y="0" width="460" height="4" rx="2" fill="url(#gold)"/>
  <!-- Glow effect -->
  <circle cx="400" cy="160" r="80" fill="rgba(252,211,77,0.04)"/>
  <circle cx="400" cy="160" r="50" fill="rgba(252,211,77,0.06)"/>
  <!-- Icon -->
  <text x="50" y="115" font-size="64" font-family="serif">💎</text>
