<svg viewBox="0 0 1024 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060d1f"/>
      <stop offset="50%" stop-color="#0d1f4a"/>
      <stop offset="100%" stop-color="#0a1535"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="bottomGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.35)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.35)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
    <clipPath id="bannerClip">
      <rect width="1024" height="320" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="320" rx="12" fill="url(#bgGrad)"/>
  <g clip-path="url(#bannerClip)">
