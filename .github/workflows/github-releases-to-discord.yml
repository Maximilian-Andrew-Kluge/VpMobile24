name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release name"
        required: true
        default: "Manual Test Release"
      release_url:
        description: "Release URL"
        required: false
        default: "https://github.com/Maximilian-Andrew-Kluge/VpMobile24"

jobs:
  discord-release:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Release Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_NAME: ${{ github.event.release.name || inputs.release_name }}
          RELEASE_URL: ${{ github.event.release.html_url || inputs.release_url }}
          RELEASE_BODY: ${{ github.event.release.body || 'Manual test run' }}
          IS_PRERELEASE: ${{ github.event.release.prerelease || 'false' }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, sys

          webhook   = os.environ["DISCORD_WEBHOOK"]
          name      = os.environ["RELEASE_NAME"]
          url       = os.environ["RELEASE_URL"]
          body      = os.environ["RELEASE_BODY"]
          prerelease = os.environ["IS_PRERELEASE"].lower() == "true"

          if prerelease:
              title_prefix = "🧪 Beta / Pre-Release"
              color = 16776960  # yellow
          else:
              title_prefix = "🚀 Neues Release"
              color = 3066993   # green

          description = (
              body + "\n\n"
              "📦 **Download:** " + url + "\n"
              "🌐 **Website:** https://maximilian-andrew-kluge.github.io/VpMobile24/website/"
          )

          payload = {
              "username": "VpMobile24 Release Bot",
              "embeds": [{
                  "title": f"{title_prefix}: {name}",
                  "description": description,
                  "url": url,
                  "color": color,
                  "footer": {"text": "VpMobile24 · GitHub Release System"}
              }]
          }

          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              webhook, data=data,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "DiscordBot (https://github.com/Maximilian-Andrew-Kluge/VpMobile24, 1.0)"
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"HTTP Status: {resp.status}")
                  print("Discord notification sent successfully!")
          except urllib.error.HTTPError as e:
              print(f"HTTP Status: {e.code}")
              print(f"Response: {e.read().decode()}")
              sys.exit(1)
          PYEOF
