name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release name"
        required: true
        default: "Manual Test Release"
      release_url:
        description: "Release URL"
        required: false
        default: "https://github.com/Maximilian-Andrew-Kluge/VpMobile24"

jobs:
  discord-release:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Release Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_NAME: ${{ github.event.release.name || inputs.release_name }}
          RELEASE_URL: ${{ github.event.release.html_url || inputs.release_url }}
          RELEASE_BODY: ${{ github.event.release.body || 'Manual test run' }}
          IS_PRERELEASE: ${{ github.event.release.prerelease || 'false' }}
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            TYPE="🧪 Beta / Pre-Release"
            COLOR=16776960
          else
            TYPE="🚀 Neues Release"
            COLOR=3066993
          fi

          # Sanitize: single line, escape backslashes and quotes
          SAFE_BODY=$(printf '%s' "$RELEASE_BODY" | tr '\n' ' ' | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
          SAFE_NAME=$(printf '%s' "$RELEASE_NAME" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
          SAFE_URL=$(printf '%s' "$RELEASE_URL" | sed 's/"/\\"/g')

          DESCRIPTION="${SAFE_BODY}\\n\\n📦 **Download:** ${SAFE_URL}\\n🌐 **Website:** https://maximilian-andrew-kluge.github.io/VpMobile24/website/"

          PAYLOAD=$(cat <<EOF
          {
            "username": "VpMobile24 Release Bot",
            "embeds": [{
              "title": "${TYPE}: ${SAFE_NAME}",
              "description": "${DESCRIPTION}",
              "url": "${SAFE_URL}",
              "color": ${COLOR},
              "footer": {
                "text": "VpMobile24 · GitHub Release System"
              }
            }]
          }
          EOF
          )

          echo "Sending to Discord..."
          HTTP_STATUS=$(curl -s -o /tmp/discord_response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $(cat /tmp/discord_response.txt)"

          if [ "$HTTP_STATUS" != "204" ] && [ "$HTTP_STATUS" != "200" ]; then
            echo "Discord webhook failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Discord notification sent successfully!"
