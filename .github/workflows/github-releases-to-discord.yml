on:
  release:
    types: [published, prereleased]
  workflow_dispatch:
    inputs:
      release_name:
        required: true
        default: "Manual Test Release"

jobs:
  discord-release:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Release
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="${{ inputs.release_name }}"
          fi

          if [ -z "$RELEASE_URL" ]; then
            RELEASE_URL="https://github.com"
          fi

          if [ -z "$RELEASE_BODY" ]; then
            RELEASE_BODY="Manual test run"
          fi

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"username\": \"Release Bot\",
            \"embeds\": [
              {
                \"title\": \"🚀 New Release: $RELEASE_NAME\",
                \"description\": \"$RELEASE_BODY\n\n📦 Download: $RELEASE_URL\n🌐 Website: https://maximilian-andrew-kluge.github.io/VpMobile24/website/\",
                \"url\": \"$RELEASE_URL\",
                \"color\": 2105893,
                \"image\": {
                  \"url\": \"https://raw.githubusercontent.com/Maximilian-Andrew-Kluge/VpMobile24/main/banner.png\"
                },
                \"footer\": {
                  \"text\": \"GitHub Release System\"
                }
              }
            ]
          }" \
          $WEBHOOK