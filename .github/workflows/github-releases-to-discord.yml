on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_name:
        required: true
        default: "Manual Test Release"
      release_url:
        required: false
        default: "https://github.com"

jobs:
  discord-release:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Release
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # ----------------------------
          # INPUTS SAFE HANDLING
          # ----------------------------

          RELEASE_NAME="${{ github.event.release.name }}"
          RELEASE_URL="${{ github.event.release.html_url }}"
          RELEASE_BODY="${{ github.event.release.body }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"

          # fallback for manual run
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="${{ inputs.release_name }}"
          fi

          if [ -z "$RELEASE_URL" ]; then
            RELEASE_URL="${{ inputs.release_url }}"
          fi

          if [ -z "$RELEASE_BODY" ]; then
            RELEASE_BODY="Manual test run"
          fi

          # ----------------------------
          # PRE-RELEASE CHECK
          # ----------------------------
          if [ "$IS_PRERELEASE" = "true" ]; then
            TYPE="🧪 Pre-Release"
          else
            TYPE="🚀 Release"
          fi

          # ----------------------------
          # SAFE TEXT (NO LINE BREAK CRASH)
          # ----------------------------
          RELEASE_BODY=$(echo "$RELEASE_BODY" | tr '\n' ' ' | sed 's/"/\\"/g')

          # ----------------------------
          # DEBUG (optional but useful)
          # ----------------------------
          echo "Name: $RELEASE_NAME"
          echo "URL: $RELEASE_URL"

          # ----------------------------
          # DISCORD SEND
          # ----------------------------
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"username\": \"Release Bot\",
            \"embeds\": [
              {
                \"title\": \"$TYPE: $RELEASE_NAME\",
                \"description\": \"$RELEASE_BODY\n\n📦 Download: $RELEASE_URL\n🌐 Website: https://maximilian-andrew-kluge.github.io/VpMobile24/website/\",
                \"url\": \"$RELEASE_URL\",
                \"color\": 2105893,
                \"image\": {
                  \"url\": \"https://raw.githubusercontent.com/Maximilian-Andrew-Kluge/VpMobile24/main/docs/Discord/Event/update-banner.svg\"
                },
                \"footer\": {
                  \"text\": \"GitHub Release System\"
                }
              }
            ]
          }" \
          "$DISCORD_WEBHOOK"