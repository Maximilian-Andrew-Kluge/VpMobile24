on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_name:
        required: true

jobs:
  discord-release:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Embed
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "username": "Release Bot",
            "avatar_url": "https://cdn.discordapp.com/avatars/487431320314576937/bd64361e4ba6313d561d54e78c9e7171.png",
            "embeds": [
              {
                "title": "🚀 New Release: ${{ github.event.release.name }}",
                "description": "${{ github.event.release.body }}",
                "url": "${{ github.event.release.html_url }}",
                "color": 2105893,
                "thumbnail": {
                  "url": "https://cdn-icons-png.flaticon.com/512/2111/2111425.png"
                },
                "image": {
                  "url": "https://your-domain.com/banner.png"
                },
                "footer": {
                  "text": "GitHub Release System"
                }
              }
            ],
            "components": [
              {
                "type": 1,
                "components": [
                  {
                    "type": 2,
                    "label": "📦 Download",
                    "style": 5,
                    "url": "${{ github.event.release.html_url }}"
                  },
                  {
                    "type": 2,
                    "label": "🔗 Release",
                    "style": 5,
                    "url": "${{ github.event.release.html_url }}"
                  },
                  {
                    "type": 2,
                    "label": "🌐 Website",
                    "style": 5,
                    "url": "https://maximilian-andrew-kluge.github.io/VpMobile24/website/"
                  }
                ]
              }
            ]
          }' \
          $WEBHOOK