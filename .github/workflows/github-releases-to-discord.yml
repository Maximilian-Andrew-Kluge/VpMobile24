name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release name"
        required: true
        default: "Manual Test Release"
      release_url:
        description: "Release URL"
        required: false
        default: "https://github.com/Maximilian-Andrew-Kluge/VpMobile24"

jobs:
  discord-release:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Release Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RELEASE_NAME: ${{ github.event.release.name || inputs.release_name }}
          RELEASE_URL: ${{ github.event.release.html_url || inputs.release_url }}
          RELEASE_BODY: ${{ github.event.release.body || 'Manual test run' }}
          IS_PRERELEASE: ${{ github.event.release.prerelease || 'false' }}
        run: |
          # Pre-release or full release
          if [ "$IS_PRERELEASE" = "true" ]; then
            TYPE="🧪 Beta / Pre-Release"
            COLOR=16776960
          else
            TYPE="🚀 Neues Release"
            COLOR=3066993
          fi

          # Sanitize body: remove newlines and escape quotes
          SAFE_BODY=$(echo "$RELEASE_BODY" | tr '\n' ' ' | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')

          DESCRIPTION="$SAFE_BODY\n\n📦 **Download:** $RELEASE_URL\n🌐 **Website:** https://maximilian-andrew-kluge.github.io/VpMobile24/website/"

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"username\": \"VpMobile24 Release Bot\",
              \"embeds\": [{
                \"title\": \"$TYPE: $RELEASE_NAME\",
                \"description\": \"$DESCRIPTION\",
                \"url\": \"$RELEASE_URL\",
                \"color\": $COLOR,
                \"footer\": {
                  \"text\": \"VpMobile24 · GitHub Release System\"
                }
              }]
            }" \
            "$DISCORD_WEBHOOK"
