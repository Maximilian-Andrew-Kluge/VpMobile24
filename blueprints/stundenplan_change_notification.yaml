blueprint:
  name: VpMobile24 – Stundenplanänderung Benachrichtigung
  description: >
    Benachrichtigt automatisch bei Änderungen im Stundenplan
    wie Vertretung, Ausfall oder Raumwechsel.

  domain: automation

  input:
    timetable_sensor:
      name: Stundenplan Sensor
      description: Wähle den Sensor deiner VpMobile24 Integration
      selector:
        entity:
          domain: sensor

    notify_devices:
      name: Benachrichtigungsgeräte
      description: Wähle ein oder mehrere Geräte für die Benachrichtigung
      selector:
        device:
          multiple: true
          filter:
            integration: mobile_app

    use_default_message:
      name: Standard-Benachrichtigung verwenden
      description: Verwendet automatisch den Standardtext
      default: true
      selector:
        boolean:

    custom_title:
      name: Eigener Titel (optional)
      description: Wird nur verwendet wenn Standard deaktiviert ist
      default: "📚 Stundenplanänderung"
      selector:
        text:

    custom_message:
      name: Eigene Nachricht (optional)
      description: Wird nur verwendet wenn Standard deaktiviert ist
      default: ""
      selector:
        text:
          multiline: true

    actions:
      name: Zusätzliche Aktionen (optional)
      description: Weitere Aktionen zusätzlich ausführen
      default: []
      selector:
        action: {}

mode: single

trigger:
  - platform: state
    entity_id: !input timetable_sensor

variables:
  use_default: !input use_default_message
  title_input: !input custom_title
  message_input: !input custom_message

action:
  - repeat:
      for_each: !input notify_devices
      sequence:
        - service: notify.mobile_app
          data:
            target:
              - "{{ device_attr(repeat.item, 'name') }}"
            title: >
              {% if use_default %}
                📚 Stundenplanänderung
              {% else %}
                {{ title_input }}
              {% endif %}
            message: >
              {% if use_default %}
                Es gibt Änderungen im Stundenplan.
              {% else %}
                {{ message_input }}
              {% endif %}

  - choose: []
    default: !input actions
