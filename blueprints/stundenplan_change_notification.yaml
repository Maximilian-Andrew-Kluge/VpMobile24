blueprint:
  name: VpMobile24 – Stundenplanänderung Benachrichtigung
  description: >
    Benachrichtigt automatisch bei Änderungen im Stundenplan.

  domain: automation
  source_url: https://github.com/Maximilian-Andrew-Kluge/VpMobile24/blob/main/blueprints/automation/vpmobile24/stundenplan_change_notification.yaml

  input:
    timetable_sensor:
      name: Stundenplan Sensor
      description: Sensor aus der VpMobile24 Integration
      selector:
        entity:
          domain: sensor

    notify_devices:
      name: Benachrichtigungsgeräte
      description: Geräte die benachrichtigt werden sollen
      selector:
        device:
          multiple: true
          filter:
            integration: mobile_app

    use_default_message:
      name: Standard-Benachrichtigung verwenden
      description: >
        Wenn aktiviert, wird automatisch die betroffene Stunde in der Nachricht angezeigt.
      default: true
      selector:
        boolean:

    custom_title:
      name: Eigener Titel (optional)
      description: Wird nur angezeigt wenn Standard deaktiviert ist
      default: "📚 Stundenplanänderung"
      selector:
        text:
      enabled: false

    custom_message:
      name: Eigene Nachricht (optional)
      description: Wird nur angezeigt wenn Standard deaktiviert ist
      default: ""
      selector:
        text:
          multiline: true
      enabled: false

    actions:
      name: Zusätzliche Aktionen (optional)
      description: Wird zusätzlich ausgeführt wenn sich der Stundenplan ändert
      default: []
      selector:
        action: {}

mode: single

trigger:
  - platform: state
    entity_id: !input timetable_sensor

variables:
  use_default: !input use_default_message
  title_input: !input custom_title
  message_input: !input custom_message

  lesson_text: >
    {% set lesson = state_attr(trigger.entity_id, 'lesson') %}
    {% set subject = state_attr(trigger.entity_id, 'subject') %}
    {% set change = state_attr(trigger.entity_id, 'change') %}

    {% if lesson and subject and change %}
      {{ lesson }}. Stunde {{ subject }} {{ change }}
    {% else %}
      Es gibt Änderungen im Stundenplan.
    {% endif %}

action:
  - if:
      - condition: template
        value_template: "{{ use_default }}"
    then:
      - repeat:
          for_each: !input notify_devices
          sequence:
            - device_id: "{{ repeat.item }}"
              domain: mobile_app
              type: notify
              title: "📚 Stundenplanänderung"
              message: "{{ lesson_text }}"
    else:
      - repeat:
          for_each: !input notify_devices
          sequence:
            - device_id: "{{ repeat.item }}"
              domain: mobile_app
              type: notify
              title: "{{ title_input }}"
              message: "{{ message_input }}"

  - choose: []
    default: !input actions