blueprint:
  name: VpMobile24 – Stundenplanänderung Benachrichtigung
  description: >
    Benachrichtigt automatisch bei Änderungen im Stundenplan.

  domain: automation
  source_url: https://github.com/Maximilian-Andrew-Kluge/VpMobile24/blob/main/blueprints/stundenplan_change_notification.yaml

  input:
    timetable_sensor:
      name: Stundenplan Sensor
      description: Wähle den Stundenplan Sensor deiner VpMobile24 Integration
      selector:
        entity:
          domain: sensor

    notify_target:
      name: Benachrichtigungsdienst
      description: >
        Wähle den Benachrichtigungsdienst aus
        (z. B. Handy, Tablet oder Gruppenbenachrichtigung)
      selector:
        entity:
          domain: notify

    use_default_message:
      name: Standard-Benachrichtigung verwenden
      description: Automatische Standardmeldung verwenden
      default: true
      selector:
        boolean:

    custom_title:
      name: Eigener Titel (optional)
      description: Wird nur verwendet wenn Standard deaktiviert ist
      default: "📚 Stundenplanänderung"
      selector:
        text:

    custom_message:
      name: Eigene Nachricht (optional)
      description: Wird nur verwendet wenn Standard deaktiviert ist
      default: ""
      selector:
        text:
          multiline: true

    actions:
      name: Zusätzliche Aktionen (optional)
      description: Weitere Aktionen bei Änderung
      default: []
      selector:
        action: {}

trigger:
  - platform: state
    entity_id: !input timetable_sensor

variables:
  notify_service: !input notify_target
  use_default: !input use_default_message
  title_input: !input custom_title
  message_input: !input custom_message

action:
  - action: notify.send_message
    target:
      entity_id: !input notify_target
    data:
      title: >
        {% if use_default %}
          📚 Stundenplanänderung
        {% else %}
          {{ title_input }}
        {% endif %}
      message: >
        {% if use_default %}
          Es gibt Änderungen im Stundenplan.
        {% else %}
          {{ message_input }}
        {% endif %}

  - choose: []
    default: !input actions

mode: single
