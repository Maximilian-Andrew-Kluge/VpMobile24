blueprint:
  name: VpMobile24 – Stundenplanänderung Benachrichtigung
  description: >
    Sendet automatisch eine Benachrichtigung, sobald Änderungen im Stundenplan erkannt werden.

    Unterstützt unter anderem:

    • Unterrichtsausfall  
    • Vertretungsunterricht  
    • Raumänderungen  
    • Lehrerwechsel  
    • Aktualisierungen im Wochenplan  

    Die Benachrichtigung zeigt – sofern verfügbar – direkt die betroffenen Änderungen an.

    Beispiel:

    📚 Stundenplanänderung

    3. Stunde Mathematik entfällt  
    Raumwechsel zu B204  
    Vertretung bei Frau Müller

  domain: automation
  source_url: https://github.com/Maximilian-Andrew-Kluge/VpMobile24/blob/main/blueprints/stundenplan_change_notification.yaml

  input:
    timetable_sensor:
      name: Stundenplan Sensor
      description: >
        Wähle den Stundenplan-Sensor deiner VpMobile24 Integration aus,
        der auf Änderungen überwacht werden soll.
      selector:
        entity:
          domain: sensor

    notify_target:
      name: Benachrichtigungsdienst
      description: >
        Wähle aus, wohin die Benachrichtigung gesendet werden soll.
        Zum Beispiel Smartphone, Tablet oder eine Gruppenbenachrichtigung.
      selector:
        entity:
          domain: notify

    use_default_message:
      name: Standard-Benachrichtigung verwenden
      description: >
        Verwendet automatisch einen Standardtext mit den erkannten Änderungen
        aus dem Stundenplan.
      default: true
      selector:
        boolean:

    custom_title:
      name: Eigener Titel (optional)
      description: >
        Eigener Titel für die Benachrichtigung.
        Wird verwendet, wenn die Standard-Benachrichtigung deaktiviert ist.
      default: "📚 Stundenplanänderung"
      selector:
        text:

    custom_message:
      name: Eigene Nachricht (optional)
      description: >
        Eigener Nachrichtentext.
        Wird verwendet, wenn die Standard-Benachrichtigung deaktiviert ist.
      default: ""
      selector:
        text:
          multiline: true

    actions:
      name: Zusätzliche Aktionen (optional)
      description: >
        Weitere Aktionen, die zusätzlich bei einer Änderung ausgeführt werden sollen.
        Zum Beispiel Licht schalten, Alexa-Ansage oder Dashboard-Benachrichtigung.
      default: []
      selector:
        action: {}

trigger:
  - platform: state
    entity_id: !input timetable_sensor

variables:
  use_default: !input use_default_message
  title_input: !input custom_title
  message_input: !input custom_message

  detected_changes: >
    {% set changes = state_attr(trigger.entity_id, 'changes') %}
    {% if changes %}
      {{ changes }}
    {% else %}
      {{ trigger.to_state.state }}
    {% endif %}

action:
  - action: notify.send_message
    target:
      entity_id: !input notify_target
    data:
      title: >
        {% if use_default %}
          📚 Stundenplanänderung
        {% else %}
          {{ title_input }}
        {% endif %}
      message: >
        {% if use_default %}
          {{ detected_changes }}
        {% else %}
          {{ message_input }}
        {% endif %}

  - choose: []
    default: !input actions

mode: single
