blueprint:
  name: VpMobile24 – Stundenplanänderung Benachrichtigung
  description: >
    Benachrichtigt automatisch bei Änderungen im Stundenplan.

  domain: automation

  input:
    timetable_sensor:
      name: Stundenplan Sensor
      selector:
        entity:
          domain: sensor

    notify_services:
      name: Benachrichtigungsdienste
      description: >
        z. B. notify.mobile_app_dein_handy oder mehrere auswählen
      selector:
        entity:
          domain: notify
          multiple: true

    use_default_message:
      name: Standard-Benachrichtigung verwenden
      default: true
      selector:
        boolean:

    custom_title:
      name: Eigener Titel (optional)
      default: "📚 Stundenplanänderung"
      selector:
        text:

    custom_message:
      name: Eigene Nachricht (optional)
      default: ""
      selector:
        text:
          multiline: true

    actions:
      name: Zusätzliche Aktionen (optional)
      default: []
      selector:
        action: {}

mode: single

trigger:
  - platform: state
    entity_id: !input timetable_sensor

variables:
  use_default: !input use_default_message
  title_input: !input custom_title
  message_input: !input custom_message

action:
  - repeat:
      for_each: !input notify_services
      sequence:
        - service: "{{ repeat.item }}"
          data:
            title: >
              {% if use_default %}
                📚 Stundenplanänderung
              {% else %}
                {{ title_input }}
              {% endif %}
            message: >
              {% if use_default %}
                Es gibt Änderungen im Stundenplan.
              {% else %}
                {{ message_input }}
              {% endif %}

  - choose: []
    default: !input actions
