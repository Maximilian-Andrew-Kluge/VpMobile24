blueprint:
  name: VpMobile24 – Stundenplanänderung Benachrichtigung
  description: >
    Benachrichtigt automatisch bei Änderungen im Stundenplan.

  domain: automation
  source_url: https://github.com/Maximilian-Andrew-Kluge/VpMobile24/blob/main/blueprints/automation/vpmobile24/stundenplan_change_notification.yaml

  input:
    timetable_sensor:
      name: Stundenplan Sensor
      description: Sensor aus der VpMobile24 Integration
      selector:
        entity:
          domain: sensor

    notify_device:
      name: Benachrichtigungsgerät
      description: Gerät das benachrichtigt werden soll
      selector:
        device:
          filter:
            integration: mobile_app

    title:
      name: Titel der Benachrichtigung
      default: "📚 Stundenplanänderung"
      selector:
        text:

    message:
      name: Nachricht
      default: "Es gibt Änderungen im Stundenplan."
      selector:
        text:

mode: single

trigger:
  - platform: state
    entity_id: !input timetable_sensor

condition:
  - condition: template
    value_template: >
      {{ trigger.from_state is not none
         and trigger.to_state is not none
         and trigger.from_state.state != trigger.to_state.state }}

action:
  - device_id: !input notify_device
    domain: mobile_app
    type: notify
    title: !input title
    message: !input message
