blueprint:
  name: VpMobile24 – Stundenplanänderung Benachrichtigung
  description: >
    Benachrichtigt automatisch, wenn sich der Stundenplan aktualisiert –
    z. B. bei Vertretung, Ausfall, Raumänderung oder Lehrerwechsel.

  domain: automation

  source_url: https://github.com/Maximilian-Andrew-Kluge/VpMobile24/blob/main/blueprints/automation/vpmobile24/stundenplan_change_notification.yaml

  input:
    timetable_sensor:
      name: Stundenplan Sensor
      description: Sensor aus der VpMobile24 Integration
      selector:
        entity:
          domain: sensor

    actions:
      name: Aktionen
      description: Wird ausgeführt wenn sich der Stundenplan ändert
      default: []
      selector:
        action: {}

mode: single

trigger:
  - platform: state
    entity_id: !input timetable_sensor

condition:
  - condition: template
    value_template: >
      {{ trigger.from_state is not none
         and trigger.to_state is not none
         and trigger.from_state.state != trigger.to_state.state }}

action: !input actions