blueprint:
  name: VpMobile24 – Stundenplan Benachrichtigung
  description: >
    Sendet Benachrichtigungen bei Stundenplanänderungen (Ausfall, Vertretung)
    und erinnert morgens an den Schulbeginn. Nutzt die VpMobile24 Integration.
  domain: automation
  author: Maximilian-Andrew Kluge
  homeassistant:
    min_version: "2023.1.0"
  input:
    week_table_sensor:
      name: Wochentabellen-Sensor
      description: "Der VpMobile24 Wochentabellen-Sensor (sensor.vpmobile24_week_table) – wird für den Klassennamen verwendet"
      selector:
        entity:
          integration: vpmobile24
          domain: sensor
    changes_sensor:
      name: Änderungen-Sensor
      description: "Der VpMobile24 Änderungen-Sensor (sensor.vpmobile24_aenderungen)"
      selector:
        entity:
          integration: vpmobile24
          domain: sensor
    next_lesson_sensor:
      name: Nächste Stunde Sensor
      description: "Der VpMobile24 Nächste Stunde Sensor (sensor.vpmobile24_naechste_stunde)"
      selector:
        entity:
          integration: vpmobile24
          domain: sensor
    notify_device:
      name: Benachrichtigungs-Gerät
      description: "Gerät das die Benachrichtigungen empfangen soll (muss die HA Companion App haben)"
      selector:
        device:
          integration: mobile_app
    morning_time:
      name: Morgen-Erinnerung Uhrzeit
      description: "Wann soll die tägliche Schulbeginn-Erinnerung gesendet werden?"
      default: "07:00:00"
      selector:
        time:
    enable_change_notification:
      name: Änderungs-Benachrichtigungen aktivieren
      description: "Benachrichtigung bei neuen Ausfällen oder Vertretungen"
      default: true
      selector:
        boolean:
    enable_morning_reminder:
      name: Morgen-Erinnerung aktivieren
      description: "Tägliche Erinnerung an den Schulbeginn"
      default: true
      selector:
        boolean:
    enable_countdown_reminder:
      name: Countdown-Erinnerung aktivieren
      description: "Benachrichtigung kurz vor der nächsten Stunde"
      default: false
      selector:
        boolean:
    countdown_minutes:
      name: Countdown-Minuten
      description: "Wie viele Minuten vor der nächsten Stunde soll erinnert werden?"
      default: 15
      selector:
        number:
          min: 5
          max: 60
          step: 5
          unit_of_measurement: Min.

variables:
  week_table_sensor: !input week_table_sensor
  changes_sensor: !input changes_sensor
  next_lesson_sensor: !input next_lesson_sensor
  enable_change_notification: !input enable_change_notification
  enable_morning_reminder: !input enable_morning_reminder
  enable_countdown_reminder: !input enable_countdown_reminder
  countdown_minutes: !input countdown_minutes
  # Klassenname aus dem Wochentabellen-Sensor
  klasse: >
    {{ states[week_table_sensor].attributes.get('class', '') }}

trigger:
  - platform: state
    entity_id: !input changes_sensor
    id: changes_updated
  - platform: time
    at: !input morning_time
    id: morning_reminder
  - platform: template
    value_template: >
      {% set sensor = states[next_lesson_sensor] %}
      {% set countdown = sensor.attributes.get('countdown_minuten', -1) | int %}
      {{ countdown == countdown_minutes | int and countdown > 0 }}
    id: countdown_reminder

condition: []

action:
  - choose:
      # ── Änderungs-Benachrichtigung ──────────────────────────────────────
      - conditions:
          - condition: trigger
            id: changes_updated
          - condition: template
            value_template: "{{ enable_change_notification }}"
          - condition: template
            value_template: >
              {{ states[changes_sensor].attributes.get('gesamt_aenderungen', 0) | int > 0 }}
        sequence:
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            title: >
              📅 Stundenplanänderung{% if klasse %} – Klasse {{ klasse }}{% endif %}
            message: >
              {% set s = states[changes_sensor] %}
              {% set n_ausfall = s.attributes.get('anzahl_aenderungen', 0) | int %}
              {% set n_vert = s.attributes.get('anzahl_vertretungen', 0) | int %}
              {% set parts = [] %}
              {% if n_ausfall > 0 %}{% set parts = parts + [n_ausfall ~ ' Ausfall' ~ ('e' if n_ausfall > 1 else '')] %}{% endif %}
              {% if n_vert > 0 %}{% set parts = parts + [n_vert ~ ' Vertretung' ~ ('en' if n_vert > 1 else '')] %}{% endif %}
              Heute: {{ parts | join(', ') }}

      # ── Morgen-Erinnerung ───────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: morning_reminder
          - condition: template
            value_template: "{{ enable_morning_reminder }}"
          - condition: time
            weekday:
              - mon
              - tue
              - wed
              - thu
              - fri
        sequence:
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            title: >
              🏫 Guten Morgen{% if klasse %} – Klasse {{ klasse }}{% endif %}
            message: >
              {% set s = states[next_lesson_sensor] %}
              {% if s.state not in ['Keine Daten', 'No data', 'Keine weiteren Stunden heute'] %}
                Nächste Stunde: {{ s.state }}
                {% if s.attributes.get('countdown_text') %} ({{ s.attributes.countdown_text }}){% endif %}
              {% else %}
                Heute keine Stunden.
              {% endif %}

      # ── Countdown-Erinnerung ────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: countdown_reminder
          - condition: template
            value_template: "{{ enable_countdown_reminder }}"
        sequence:
          - device_id: !input notify_device
            domain: mobile_app
            type: notify
            title: >
              ⏰ Bald Schulbeginn{% if klasse %} – Klasse {{ klasse }}{% endif %}
            message: >
              {% set s = states[next_lesson_sensor] %}
              In {{ countdown_minutes }} Minuten: {{ s.state }}
              {% if s.attributes.get('raum') %} (Raum: {{ s.attributes.raum }}){% endif %}

mode: single
