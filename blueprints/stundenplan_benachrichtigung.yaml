blueprint:
  name: VpMobile24 – Stundenplan Benachrichtigung
  description: >
    Sendet Benachrichtigungen bei Stundenplanänderungen (Ausfall, Vertretung)
    und erinnert morgens an den Schulbeginn. Nutzt die VpMobile24 Integration.
  domain: automation
  author: Maximilian-Andrew Kluge
  homeassistant:
    min_version: "2023.1.0"
  input:
    changes_sensor:
      name: Änderungen-Sensor
      description: "Der VpMobile24 Änderungen-Sensor (sensor.vpmobile24_aenderungen)"
      selector:
        entity:
          integration: vpmobile24
          domain: sensor
    next_lesson_sensor:
      name: Nächste Stunde Sensor
      description: "Der VpMobile24 Nächste Stunde Sensor (sensor.vpmobile24_naechste_stunde)"
      selector:
        entity:
          integration: vpmobile24
          domain: sensor
    notify_device:
      name: Benachrichtigungs-Gerät
      description: "Gerät das die Benachrichtigungen empfangen soll (muss die HA Companion App haben)"
      selector:
        device:
          integration: mobile_app
    morning_time:
      name: Morgen-Erinnerung Uhrzeit
      description: "Wann soll die tägliche Schulbeginn-Erinnerung gesendet werden?"
      default: "07:00:00"
      selector:
        time:
    enable_change_notification:
      name: Änderungs-Benachrichtigungen aktivieren
      description: "Benachrichtigung bei neuen Ausfällen oder Vertretungen"
      default: true
      selector:
        boolean:
    enable_morning_reminder:
      name: Morgen-Erinnerung aktivieren
      description: "Tägliche Erinnerung an den Schulbeginn"
      default: true
      selector:
        boolean:
    enable_countdown_reminder:
      name: Countdown-Erinnerung aktivieren
      description: "Benachrichtigung kurz vor der nächsten Stunde"
      default: false
      selector:
        boolean:
    countdown_minutes:
      name: Countdown-Minuten
      description: "Wie viele Minuten vor der nächsten Stunde soll erinnert werden?"
      default: 15
      selector:
        number:
          min: 5
          max: 60
          step: 5
          unit_of_measurement: Min.

trigger:
  - platform: state
    entity_id: !input changes_sensor
    id: changes_updated
  - platform: time
    at: !input morning_time
    id: morning_reminder
  - platform: template
    value_template: >
      {% set sensor = states[input.next_lesson_sensor] %}
      {% set countdown = sensor.attributes.get('countdown_minuten', -1) %}
      {{ countdown == input.countdown_minutes | int }}
    id: countdown_reminder

condition: []

action:
  - choose:
      # ── Änderungs-Benachrichtigung ──────────────────────────────────────
      - conditions:
          - condition: trigger
            id: changes_updated
          - condition: template
            value_template: "{{ input.enable_change_notification }}"
          - condition: template
            value_template: >
              {% set s = states[input.changes_sensor] %}
              {{ s.attributes.get('gesamt_aenderungen', 0) | int > 0 }}
        sequence:
          - service: notify.mobile_app_{{ device_attr(input.notify_device, 'name') | lower | replace(' ', '_') }}
            data:
              title: "📅 Stundenplanänderung"
              message: >
                {% set s = states[input.changes_sensor] %}
                {% set n_ausfall = s.attributes.get('anzahl_aenderungen', 0) %}
                {% set n_vert = s.attributes.get('anzahl_vertretungen', 0) %}
                {% set parts = [] %}
                {% if n_ausfall > 0 %}{% set parts = parts + [n_ausfall ~ ' Ausfall' ~ ('e' if n_ausfall > 1 else '')] %}{% endif %}
                {% if n_vert > 0 %}{% set parts = parts + [n_vert ~ ' Vertretung' ~ ('en' if n_vert > 1 else '')] %}{% endif %}
                Heute: {{ parts | join(', ') }}

      # ── Morgen-Erinnerung ───────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: morning_reminder
          - condition: template
            value_template: "{{ input.enable_morning_reminder }}"
          - condition: time
            weekday:
              - mon
              - tue
              - wed
              - thu
              - fri
        sequence:
          - service: notify.mobile_app_{{ device_attr(input.notify_device, 'name') | lower | replace(' ', '_') }}
            data:
              title: "🏫 Guten Morgen – Schulbeginn"
              message: >
                {% set s = states[input.next_lesson_sensor] %}
                {% if s.state not in ['Keine Daten', 'No data', 'Keine weiteren Stunden heute'] %}
                  Nächste Stunde: {{ s.state }}
                  {% if s.attributes.get('countdown_text') %}
                  ({{ s.attributes.countdown_text }})
                  {% endif %}
                {% else %}
                  Heute keine Stunden.
                {% endif %}

      # ── Countdown-Erinnerung ────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: countdown_reminder
          - condition: template
            value_template: "{{ input.enable_countdown_reminder }}"
        sequence:
          - service: notify.mobile_app_{{ device_attr(input.notify_device, 'name') | lower | replace(' ', '_') }}
            data:
              title: "⏰ Bald Schulbeginn"
              message: >
                {% set s = states[input.next_lesson_sensor] %}
                In {{ input.countdown_minutes }} Minuten: {{ s.state }}
                {% if s.attributes.get('raum') %}
                (Raum: {{ s.attributes.raum }})
                {% endif %}

mode: single
