blueprint:
  name: VpMobile24 – Stundenplanänderung Benachrichtigung
  description: >
    Sendet automatisch eine Benachrichtigung, sobald Änderungen im Stundenplan
    erkannt werden (Ausfall, Vertretung, Raumänderung, Lehrerwechsel).

    Die Benachrichtigung zeigt die Anzahl der Änderungen und – sofern verfügbar –
    den Klassennamen an.

    Beispiel:
    � Stundenplanänderung – Klasse 10b
    Heute: 2 Ausfälle, 1 Vertretung

  domain: automation
  author: Maximilian-Andrew Kluge
  source_url: https://github.com/Maximilian-Andrew-Kluge/VpMobile24/blob/main/blueprints/stundenplan_change_notification.yaml
  homeassistant:
    min_version: "2023.1.0"

  input:
    week_table_sensor:
      name: Wochentabellen-Sensor
      description: >
        Der VpMobile24 Wochentabellen-Sensor (sensor.vpmobile24_week_table).
        Wird für den Klassennamen verwendet.
      selector:
        entity:
          integration: vpmobile24
          domain: sensor

    changes_sensor:
      name: Änderungen-Sensor
      description: >
        Der VpMobile24 Änderungen-Sensor (sensor.vpmobile24_aenderungen).
        Löst die Benachrichtigung aus wenn sich Änderungen ergeben.
      selector:
        entity:
          integration: vpmobile24
          domain: sensor

    notify_device:
      name: Benachrichtigungs-Gerät
      description: >
        Gerät das die Benachrichtigung empfangen soll.
        Das Gerät muss die Home Assistant Companion App installiert haben.
      selector:
        device:
          integration: mobile_app

    custom_title:
      name: Eigener Titel (optional)
      description: >
        Eigener Titel für die Benachrichtigung.
        Leer lassen für den Standard-Titel mit Klassenname.
      default: ""
      selector:
        text:

    custom_message:
      name: Eigene Nachricht (optional)
      description: >
        Eigener Nachrichtentext.
        Leer lassen für die automatische Zusammenfassung der Änderungen.
      default: ""
      selector:
        text:
          multiline: true

variables:
  week_table_sensor: !input week_table_sensor
  changes_sensor: !input changes_sensor
  custom_title: !input custom_title
  custom_message: !input custom_message
  klasse: >
    {{ states[week_table_sensor].attributes.get('class', '') }}

trigger:
  - platform: state
    entity_id: !input changes_sensor
    not_to:
      - "unavailable"
      - "unknown"

condition:
  # Nur auslösen wenn sich der State-Wert wirklich geändert hat
  - condition: template
    value_template: >
      {{ trigger.from_state is not none and
         trigger.from_state.state != trigger.to_state.state }}
  # Nur wenn tatsächlich Änderungen vorhanden sind
  - condition: template
    value_template: >
      {{ states[changes_sensor].attributes.get('gesamt_aenderungen', 0) | int > 0 }}

action:
  # 10 Sekunden warten damit alle Daten vollständig geladen sind
  - delay: "00:00:10"

  - device_id: !input notify_device
    domain: mobile_app
    type: notify
    title: >
      {% if custom_title %}
        {{ custom_title }}
      {% else %}
        📅 Stundenplanänderung{% if klasse %} – Klasse {{ klasse }}{% endif %}
      {% endif %}
    message: >
      {% if custom_message %}
        {{ custom_message }}
      {% else %}
        {% set s = states[changes_sensor] %}
        {% set n_ausfall = s.attributes.get('anzahl_aenderungen', 0) | int %}
        {% set n_vert = s.attributes.get('anzahl_vertretungen', 0) | int %}
        {% set parts = [] %}
        {% if n_ausfall > 0 %}
          {% set parts = parts + [n_ausfall ~ ' Ausfall' ~ ('e' if n_ausfall > 1 else '')] %}
        {% endif %}
        {% if n_vert > 0 %}
          {% set parts = parts + [n_vert ~ ' Vertretung' ~ ('en' if n_vert > 1 else '')] %}
        {% endif %}
        {% if parts %}
          Heute: {{ parts | join(', ') }}
        {% else %}
          Es gibt Änderungen im Stundenplan.
        {% endif %}
      {% endif %}

mode: restart
max_exceeded: silent
