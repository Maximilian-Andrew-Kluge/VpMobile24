blueprint:
  name: VpMobile24 – Stundenplanänderung
  description: Benachrichtigt bei Änderungen im Stundenplan
  domain: automation
  input:
    timetable_sensor:
      name: Stundenplan Sensor
      description: Sensor deiner VpMobile24 Integration
      selector:
        entity:
          domain: sensor

    actions:
      name: Aktionen
      description: Was soll bei einer Änderung passieren?
      default: []
      selector:
        action: {}

trigger:
  - platform: state
    entity_id: !input timetable_sensor

condition:
  - condition: template
    value_template: >
      {{ trigger.from_state is not none
         and trigger.to_state is not none
         and trigger.from_state.state != trigger.to_state.state }}

action: !input actions

mode: single
